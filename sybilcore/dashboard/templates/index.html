<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYBILCORE // DOMINATOR DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Fira Code', monospace;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 2rem 1rem 1rem;
            border-bottom: 1px solid #1a1a2e;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #39FF14;
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }

        header p {
            font-size: 0.75rem;
            color: #666;
            margin-top: 0.4rem;
            letter-spacing: 0.1em;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem;
            font-size: 0.7rem;
            color: #888;
            border-bottom: 1px solid #1a1a2e;
        }

        .stats-bar span { letter-spacing: 0.05em; }
        .stats-bar .value { color: #39FF14; font-weight: 600; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #111;
            border: 1px solid #1a1a2e;
            border-radius: 6px;
            padding: 1.2rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: var(--tier-color);
            box-shadow: 0 0 12px var(--tier-color);
        }

        .card:hover {
            border-color: var(--tier-color);
            box-shadow: 0 0 15px rgba(var(--tier-rgb), 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .agent-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            max-width: 60%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tier-badge {
            font-size: 0.6rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #0a0a0a;
            background: var(--tier-color);
        }

        .coefficient {
            font-size: 2rem;
            font-weight: 700;
            color: var(--tier-color);
            text-shadow: 0 0 20px rgba(var(--tier-rgb), 0.4);
            margin-bottom: 0.6rem;
        }

        .meta {
            font-size: 0.65rem;
            color: #555;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .meta span { letter-spacing: 0.03em; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #333;
            font-size: 0.85rem;
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .pulse { animation: pulse 2s ease-in-out infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <header>
        <h1>SYBILCORE // DOMINATOR DASHBOARD</h1>
        <p>Agent Trust Infrastructure &mdash; Psycho-Pass Grade</p>
    </header>

    <div class="stats-bar">
        <span>AGENTS: <span class="value" id="agent-count">0</span></span>
        <span>STATUS: <span class="value pulse" id="status">SCANNING</span></span>
        <span>UPDATED: <span class="value" id="last-update">--</span></span>
    </div>

    <div class="grid" id="agent-grid">
        <div class="empty-state">
            <div class="icon">&#9678;</div>
            <p>No agents monitored. POST events to /scan to begin.</p>
        </div>
    </div>

    <script>
        const TIER_COLORS = {
            'clear': '#39FF14',
            'clouded': '#FFD700',
            'flagged': '#FF6600',
            'lethal_eliminator': '#FF0040'
        };

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function renderAgents(agents) {
            const grid = document.getElementById('agent-grid');
            document.getElementById('agent-count').textContent = agents.length;

            if (agents.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">&#9678;</div><p>No agents monitored. POST events to /scan to begin.</p></div>';
                return;
            }

            grid.innerHTML = agents.map(a => {
                const color = a.tier_color || TIER_COLORS[a.tier] || '#FFFFFF';
                const rgb = hexToRgb(color);
                const tierLabel = a.tier.replace('_', ' ');
                const safeName = escapeHtml(a.name || a.agent_id);
                const safeId = escapeHtml(a.agent_id);
                const safeStatus = escapeHtml(a.status.toUpperCase());
                const safeTier = escapeHtml(tierLabel);
                return `
                    <div class="card" style="--tier-color: ${color}; --tier-rgb: ${rgb}">
                        <div class="card-header">
                            <span class="agent-name" title="${safeId}">${safeName}</span>
                            <span class="tier-badge">${safeTier}</span>
                        </div>
                        <div class="coefficient">${a.coefficient.toFixed(1)}</div>
                        <div class="meta">
                            <span>ID: ${safeId}</span>
                            <span>STATUS: ${safeStatus}</span>
                            <span>EVENTS: ${a.event_count}</span>
                            <span>UPDATED: ${formatTime(a.last_updated)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function refresh() {
            try {
                const res = await fetch('./api/agents');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderAgents(data.agents);
                document.getElementById('status').textContent = 'OPERATIONAL';
                document.getElementById('last-update').textContent = formatTime(data.timestamp);
            } catch (err) {
                document.getElementById('status').textContent = 'OFFLINE';
                console.error('Dashboard refresh failed:', err);
            }
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
